<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6F4E"/>
      <stop offset="100%" style="stop-color:#4CAF7F"/>
    </linearGradient>
    <linearGradient id="threadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>

  <!-- Woven Thread Pattern (Horizontal) -->
  <path d="M 30 60 Q 60 50, 100 60 T 170 60" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 30 80 Q 60 70, 100 80 T 170 80" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 30 100 Q 60 90, 100 100 T 170 100" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 30 120 Q 60 110, 100 120 T 170 120" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 30 140 Q 60 130, 100 140 T 170 140" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Woven Thread Pattern (Vertical) -->
  <path d="M 60 30 Q 50 60, 60 100 T 60 170" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 80 30 Q 70 60, 80 100 T 80 170" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 30 Q 90 60, 100 100 T 100 170" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 120 30 Q 110 60, 120 100 T 120 170" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 140 30 Q 130 60, 140 100 T 140 170" stroke="url(#threadGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Circuit/Tech Nodes at Intersections -->
  <circle cx="100" cy="100" r="8" fill="#ffffff"/>
  <circle cx="60" cy="60" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="140" cy="60" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="60" cy="140" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="140" cy="140" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Circuit Lines -->
  <line x1="100" y1="100" x2="60" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="140" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="60" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="140" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

  <!-- DNA Helix Accent (subtle curve on right side) -->
  <path d="M 155 70 Q 165 85, 155 100 T 155 130" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 165 70 Q 155 85, 165 100 T 165 130" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
