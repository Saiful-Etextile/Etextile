<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Primary Gradient: Deep Blue to Electric Cyan -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>

    <!-- Accent Gradient: Purple to Pink -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>

    <!-- Subtle Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Outer Hexagon Frame -->
  <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="2"/>

  <!-- Inner Hexagon -->
  <polygon points="100,30 160,65 160,135 100,170 40,135 40,65" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Hexagonal Grid Pattern (Nanotechnology) -->
  <g opacity="0.15" stroke="#06B6D4" stroke-width="0.5" fill="none">
    <!-- Row 1 -->
    <polygon points="70,50 80,56 80,68 70,74 60,68 60,56"/>
    <polygon points="90,50 100,56 100,68 90,74 80,68 80,56"/>
    <polygon points="110,50 120,56 120,68 110,74 100,68 100,56"/>
    <polygon points="130,50 140,56 140,68 130,74 120,68 120,56"/>
    <!-- Row 2 -->
    <polygon points="60,74 70,80 70,92 60,98 50,92 50,80"/>
    <polygon points="80,74 90,80 90,92 80,98 70,92 70,80"/>
    <polygon points="100,74 110,80 110,92 100,98 90,92 90,80"/>
    <polygon points="120,74 130,80 130,92 120,98 110,92 110,80"/>
    <polygon points="140,74 150,80 150,92 140,98 130,92 130,80"/>
    <!-- Row 3 -->
    <polygon points="70,98 80,104 80,116 70,122 60,116 60,104"/>
    <polygon points="90,98 100,104 100,116 90,122 80,116 80,104"/>
    <polygon points="110,98 120,104 120,116 110,122 100,116 100,104"/>
    <polygon points="130,98 140,104 140,116 130,122 120,116 120,104"/>
    <!-- Row 4 -->
    <polygon points="80,122 90,128 90,140 80,146 70,140 70,128"/>
    <polygon points="100,122 110,128 110,140 100,146 90,140 90,128"/>
    <polygon points="120,122 130,128 130,140 120,146 110,140 110,128"/>
  </g>

  <!-- Fabric Weave Pattern - Horizontal Threads -->
  <g stroke="url(#primaryGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 45 65 Q 65 58, 85 65 T 125 65 T 155 65"/>
    <path d="M 45 85 Q 65 78, 85 85 T 125 85 T 155 85"/>
    <path d="M 45 105 Q 65 98, 85 105 T 125 105 T 155 105"/>
    <path d="M 45 125 Q 65 118, 85 125 T 125 125 T 155 125"/>
  </g>

  <!-- Fabric Weave Pattern - Vertical Threads -->
  <g stroke="url(#primaryGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 65 45 Q 58 65, 65 85 T 65 125 T 65 155"/>
    <path d="M 85 45 Q 78 65, 85 85 T 85 125 T 85 155"/>
    <path d="M 105 45 Q 98 65, 105 85 T 105 125 T 105 155"/>
    <path d="M 125 45 Q 118 65, 125 85 T 125 125 T 125 155"/>
  </g>

  <!-- Conductive Pathways (Circuit Lines) -->
  <g stroke="url(#accentGrad)" stroke-width="2" fill="none" filter="url(#glow)">
    <!-- Main Circuit Path 1 -->
    <path d="M 65 65 L 85 65 L 85 85 L 105 85 L 105 105 L 125 105 L 125 125"/>
    <!-- Main Circuit Path 2 -->
    <path d="M 135 65 L 115 65 L 115 85 L 95 85 L 95 105 L 75 105 L 75 125"/>
    <!-- Connecting Paths -->
    <path d="M 85 65 L 85 45"/>
    <path d="M 105 105 L 105 145"/>
    <path d="M 65 85 L 45 85"/>
    <path d="M 125 125 L 145 125"/>
  </g>

  <!-- Circuit Nodes (Intersection Points) -->
  <g fill="url(#accentGrad)" filter="url(#glow)">
    <circle cx="65" cy="65" r="4"/>
    <circle cx="85" cy="65" r="4"/>
    <circle cx="85" cy="85" r="4"/>
    <circle cx="105" cy="85" r="4"/>
    <circle cx="105" cy="105" r="5"/>
    <circle cx="125" cy="105" r="4"/>
    <circle cx="125" cy="125" r="4"/>
    <circle cx="115" cy="65" r="3.5"/>
    <circle cx="115" cy="85" r="3.5"/>
    <circle cx="95" cy="85" r="3.5"/>
    <circle cx="95" cy="105" r="3.5"/>
    <circle cx="75" cy="105" r="3.5"/>
    <circle cx="75" cy="125" r="3.5"/>
  </g>

  <!-- Central Core Node -->
  <circle cx="100" cy="100" r="8" fill="url(#accentGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff"/>

  <!-- Corner Accent Nodes -->
  <g fill="#06B6D4" opacity="0.7">
    <circle cx="65" cy="45" r="2.5"/>
    <circle cx="135" cy="45" r="2.5"/>
    <circle cx="65" cy="155" r="2.5"/>
    <circle cx="135" cy="155" r="2.5"/>
  </g>

  <!-- Subtle Signal Waves (from center) -->
  <g stroke="url(#accentGrad)" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="100" cy="100" r="20"/>
    <circle cx="100" cy="100" r="30"/>
    <circle cx="100" cy="100" r="40"/>
  </g>
</svg>
